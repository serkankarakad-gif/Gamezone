<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1565C0">
<title>Türk İmparatorluğu</title>
<link rel="stylesheet" href="stil.css">
</head>
<body>

<!-- LOADER -->
<div id="loader" class="hidden">
  <div class="loader-ring"></div>
  <div class="loader-msg" id="loader-msg">Yükleniyor...</div>
</div>

<!-- ═══ AUTH EKRANI ═══ -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo-wrap">
      <div class="auth-logo-img">🏛️</div>
      <div class="auth-logo-text">Türk <span>İmparatorluğu</span></div>
      <div class="auth-logo-sub">Ekonomi simülasyon oyunu</div>
    </div>

    <!-- GİRİŞ -->
    <div id="screen-login" class="auth-card">
      <h2>Giriş Yap</h2>
      <div class="form-field">
        <label>E-posta</label>
        <input id="login-email" type="email" class="inp" placeholder="ornek@mail.com" autocomplete="email">
      </div>
      <div class="form-field">
        <label>Şifre</label>
        <input id="login-pass" type="password" class="inp" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')AUTH.login()">
      </div>
      <button class="btn btn-blue btn-fw btn-lg" id="login-btn" onclick="AUTH.login()">Giriş Yap</button>
      <div class="auth-switch" style="margin-top:.75rem">
        <a onclick="AUTH.show('forgot')">Şifremi Unuttum</a>
      </div>
      <div class="auth-switch">
        Hesabın yok mu? <a onclick="AUTH.show('reg')">Kayıt Ol</a>
      </div>
    </div>

    <!-- KAYIT -->
    <div id="screen-reg" class="auth-card hidden">
      <h2>Kayıt Ol</h2>
      <div class="form-field">
        <label>Kullanıcı Adı</label>
        <input id="reg-name" type="text" class="inp" placeholder="AliVeli123" autocomplete="username">
      </div>
      <div class="form-field">
        <label>E-posta</label>
        <input id="reg-email" type="email" class="inp" placeholder="ornek@mail.com" autocomplete="email">
      </div>
      <div class="form-field">
        <label>Şifre <span style="font-weight:400;color:var(--text3)">(8+ karakter)</span></label>
        <input id="reg-pass" type="password" class="inp" placeholder="••••••••" autocomplete="new-password">
      </div>
      <div class="form-field">
        <label>Şifre Tekrar</label>
        <input id="reg-pass2" type="password" class="inp" placeholder="••••••••" autocomplete="new-password"
               onkeydown="if(event.key==='Enter')AUTH.register()">
      </div>
      <label style="display:flex;align-items:center;gap:.5rem;font-size:.83rem;margin-bottom:.5rem;cursor:pointer">
        <input type="checkbox" id="reg-terms" style="accent-color:var(--blue)">
        <span>Kullanım koşullarını kabul ediyorum</span>
      </label>
      <button class="btn btn-blue btn-fw btn-lg" id="reg-btn" onclick="AUTH.register()">
        Kayıt Ol — 20.000 TL ile başla!
      </button>
      <div class="auth-switch">
        Hesabın var mı? <a onclick="AUTH.show('login')">Giriş Yap</a>
      </div>
    </div>

    <!-- ŞİFRE SIFIRLA -->
    <div id="screen-forgot" class="auth-card hidden">
      <h2>Şifremi Unuttum</h2>
      <div class="form-field">
        <label>E-posta</label>
        <input id="forgot-email" type="email" class="inp" placeholder="ornek@mail.com">
      </div>
      <button class="btn btn-blue btn-fw" id="forgot-btn" onclick="AUTH.forgotPassword()">Sıfırlama Linki Gönder</button>
      <div class="auth-switch"><a onclick="AUTH.show('login')">← Geri</a></div>
    </div>
  </div>
</div>

<!-- ═══ ANA UYGULAMA ═══ -->
<div id="app" class="hidden">

  <!-- MAVİ HEADER -->
  <header class="app-header">
    <div class="header-top">
      <div class="header-logo">Türk <span>İmparatorluğu</span></div>
      <div class="header-icons">
        <button class="header-icon-btn" onclick="UI.showSection('chat')" title="Sohbet">
          💬<span class="notif-badge hidden" id="chat-badge">0</span>
        </button>
        <button class="header-icon-btn" onclick="UI.showSection('bildirimler')" title="Bildirimler">
          🔔<span class="notif-badge hidden" id="notif-badge">0</span>
        </button>
        <button class="header-icon-btn" onclick="UI.showSection('banka')" title="Banka">🏦</button>
        <button class="header-icon-btn" onclick="UI.showSection('profil')" title="Profil">👤</button>
        <button class="header-icon-btn" id="more-btn" onclick="UI.showMoreMenu()">⋮</button>
      </div>
    </div>
    <div class="header-stats">
      <div class="hstat-level">
        <div class="hstat-level-num" id="hud-level">1</div>
        <div style="font-size:.65rem;color:rgba(255,255,255,.8)">Sv.</div>
      </div>
      <div class="hstat-xp">
        <div class="hstat-xp-bar"><div class="hstat-xp-fill" id="hud-xp-bar" style="width:0%"></div></div>
        <div class="hstat-xp-text" id="hud-xp-text">0 / 1000 XP</div>
      </div>
      <div class="hstat-diamond">💎 <span id="hud-elmas">0</span></div>
      <div class="hstat-cash">💵 <span id="hud-cash">0</span></div>
    </div>
  </header>

  <!-- SAYFA İÇERİĞİ -->
  <div class="main-scroll" id="main-content"></div>

  <!-- ALT NAVİGASYON -->
  <nav class="bottom-nav">
    <button class="nav-tab active" data-section="anasayfa" onclick="UI.navTo('anasayfa', this)">
      <span class="nav-tab-icon">🏠</span>
      <span class="nav-tab-label">Ana Sayfa</span>
    </button>
    <button class="nav-tab" data-section="uretim" onclick="UI.navTo('uretim', this)">
      <span class="nav-tab-icon">🏭</span>
      <span class="nav-tab-label">Üretim</span>
    </button>
    <button class="nav-tab" data-section="piyasalar" onclick="UI.navTo('piyasalar', this)">
      <span class="nav-tab-icon">📈</span>
      <span class="nav-tab-label">Piyasalar</span>
    </button>
    <button class="nav-tab" data-section="isletme" onclick="UI.navTo('isletme', this)">
      <span class="nav-tab-icon">💼</span>
      <span class="nav-tab-label">İşletme</span>
    </button>
    <button class="nav-tab" data-section="profil" onclick="UI.navTo('profil', this)">
      <span class="nav-tab-icon">👤</span>
      <span class="nav-tab-label">Profil</span>
    </button>
  </nav>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="hidden" onclick="if(event.target===this)UI.closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="UI.closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- ═══ Firebase SDK ═══ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- ═══ OYUN DOSYALARI — SIRA KRİTİK ═══ -->
<script src="veri.js"></script>
<script src="firebase.js"></script>
<script src="kimlik.js"></script>
<script src="ui.js"></script>
<script src="piyasa.js"></script>
<script src="banka.js"></script>
<script src="uretim.js"></script>
<script src="dukkan.js"></script>
<script src="gayrimenkul.js"></script>
<script src="sigorta.js"></script>
<script src="gorev.js"></script>
<script src="oyun.js"></script>

</body>
</html>
